# ── Prefix ──────────────────────────────────────────────────────────────────
# F12 mirrors zellij's F12 → pane mode trigger
unbind C-b
set -g prefix F12
bind F12 send-prefix

# ── General ─────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -sg escape-time 0
set -g focus-events on
set -g set-clipboard on

# ── Vi copy mode ─────────────────────────────────────────────────────────────
set -g mode-keys vi
bind -T copy-mode-vi h send -X cursor-left
bind -T copy-mode-vi j send -X cursor-down
bind -T copy-mode-vi k send -X cursor-up
bind -T copy-mode-vi l send -X cursor-right
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi d send -X halfpage-down
bind -T copy-mode-vi u send -X halfpage-up
bind -T copy-mode-vi C-f send -X page-down
bind -T copy-mode-vi C-b send -X page-up
bind -T copy-mode-vi / command-prompt -p "search:" "send -X search-forward '%%'"
bind -T copy-mode-vi n send -X search-again
bind -T copy-mode-vi p send -X search-reverse

# ── Pane navigation without prefix (mirrors zellij normal mode Alt bindings) ──
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ── Window switching without prefix (mirrors zellij Alt+1-5) ─────────────────
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ── Pane management with prefix (mirrors zellij pane mode) ───────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind s split-window -v -c "#{pane_current_path}"   # split down
bind v split-window -h -c "#{pane_current_path}"   # split right
bind f resize-pane -Z                               # fullscreen toggle
bind x kill-pane                                    # close pane
bind e display-message "Use zoom (f) — floating panes not supported in tmux"

# ── Window (tab) management (mirrors zellij tab mode) ────────────────────────
bind a new-window -c "#{pane_current_path}"
bind c command-prompt -I "#W" "rename-window '%%'"
bind q kill-window
bind p previous-window
bind n next-window
bind M-i swap-window -t -1 \; select-window -t -1  # move tab left
bind M-o swap-window -t +1 \; select-window -t +1  # move tab right

# ── Scroll / copy mode (mirrors zellij scroll mode Ctrl+s) ───────────────────
bind [ copy-mode
bind C-s copy-mode

# ── Resize key table (mirrors zellij resize mode, enter with prefix+r) ───────
bind r switch-client -T resize
bind -T resize h resize-pane -L 2 \; switch-client -T resize
bind -T resize j resize-pane -D 2 \; switch-client -T resize
bind -T resize k resize-pane -U 2 \; switch-client -T resize
bind -T resize l resize-pane -R 2 \; switch-client -T resize
bind -T resize H resize-pane -R 2 \; switch-client -T resize  # decrease left
bind -T resize J resize-pane -U 2 \; switch-client -T resize  # decrease down
bind -T resize K resize-pane -D 2 \; switch-client -T resize  # decrease up
bind -T resize L resize-pane -L 2 \; switch-client -T resize  # decrease right
bind -T resize + resize-pane -x 5 \; switch-client -T resize
bind -T resize = resize-pane -x 5 \; switch-client -T resize
bind -T resize - resize-pane -y 5 \; switch-client -T resize
bind -T resize Escape switch-client -T root
bind -T resize Enter switch-client -T root

# ── Session (mirrors zellij session mode) ────────────────────────────────────
bind d detach-client
bind C-q confirm-before -p "Kill session? (y/n)" kill-session

# ── Appearance (mirrors match-term: uses terminal's 16 ANSI colors) ──────────
set -g status-style "bg=default,fg=default"
set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour4"
set -g message-style "bg=default,fg=colour4"
set -g mode-style "bg=colour4,fg=colour0"

# ── Status bar (mirrors zjstatus: left | center | right) ─────────────────────
set -g status on
set -g status-position bottom
set -g status-interval 10
set -g status-justify centre

# Left: session name + user@host (mirrors zjstatus format_left)
set -g status-left-length 60
set -g status-left "#[fg=colour4,bold] #{session_name} #[fg=colour4,nobold] #(whoami)@#H "

# Right: git branch + time (mirrors zjstatus format_right)
set -g status-right-length 60
set -g status-right "#[fg=colour4] #(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null) #[fg=colour8,bold] %H:%M "

# Windows (tabs) in center (mirrors zjstatus tab_normal / tab_active)
set -g window-status-format "#[fg=colour8] #{window_index}:#{window_name} "
set -g window-status-current-format "#[fg=colour4,bold,italics] #{window_index}:#{window_name} "
set -g window-status-separator ""
