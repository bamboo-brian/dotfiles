# Base behavior
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -g escape-time 0
set -g focus-events on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
setw -g allow-rename off

# Use a leader that won't fight Zellij's Alt bindings when tmux runs nested.
set -g prefix C-a
set -g prefix2 None
unbind C-b
bind-key C-a send-prefix

# Keep the status line minimal: session name and tabs only.
set -g status-position bottom
set -g status-style "fg=colour15,bg=colour0"
set -g status-left " #S "
set -g status-right ""
set -g status-justify left
set -g status-left-length 32
set -g status-right-length 0
set -g window-status-separator ""
set -g window-status-format "#[fg=colour8,bg=colour0] #I:#W "
set -g window-status-current-format "#[fg=colour0,bg=colour11,bold] #I:#W "

# Pane titles give tmux the closest equivalent to Zellij pane frames.
set -g pane-border-status top
set -g pane-border-format " #{pane_index} "
set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour11"

# Preserve current working directory when splitting.
unbind '"'
unbind %

# Prefix equivalents for the old Alt-root shortcuts.
bind-key h if-shell -F "#{pane_at_left}" "previous-window" "select-pane -L"
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l if-shell -F "#{pane_at_right}" "next-window" "select-pane -R"
bind-key Left if-shell -F "#{pane_at_left}" "previous-window" "select-pane -L"
bind-key Down select-pane -D
bind-key Up select-pane -U
bind-key Right if-shell -F "#{pane_at_right}" "next-window" "select-pane -R"
bind-key 1 select-window -t :=1
bind-key 2 select-window -t :=2
bind-key 3 select-window -t :=3
bind-key 4 select-window -t :=4
bind-key 5 select-window -t :=5
bind-key 6 select-window -t :=6
bind-key 7 select-window -t :=7
bind-key 8 select-window -t :=8
bind-key 9 select-window -t :=9
bind-key i swap-window -t -1
bind-key o swap-window -t +1
bind-key = resize-pane -Z
bind-key - resize-pane -Z
bind-key f if-shell -F '#{==:#{pane-border-status},off}' 'set -g pane-border-status top' 'set -g pane-border-status off'
bind-key m switch-client -T move

# Direct navigation from the root table for nested tmux use.
bind-key -T root C-h if-shell -F "#{pane_at_left}" "previous-window" "select-pane -L"
bind-key -T root C-j select-pane -D
bind-key -T root C-k select-pane -U
bind-key -T root C-l if-shell -F "#{pane_at_right}" "next-window" "select-pane -R"
bind-key -T root C-Left if-shell -F "#{pane_at_left}" "previous-window" "select-pane -L"
bind-key -T root C-Down select-pane -D
bind-key -T root C-Up select-pane -U
bind-key -T root C-Right if-shell -F "#{pane_at_right}" "next-window" "select-pane -R"

# Mode entry points, following the Zellij control chords.
bind-key -T root C-p switch-client -T pane
bind-key -T root C-t switch-client -T tab
bind-key -T root C-n switch-client -T resize
bind-key -T root C-s copy-mode
bind-key -T root C-b switch-client -T tmux
bind-key -T root F12 if-shell -F '#{==:#{pane-border-status},off}' 'set -g pane-border-status top' 'set -g pane-border-status off'

# Pane mode
bind-key -T pane Escape switch-client -T root
bind-key -T pane C-p switch-client -T root
bind-key -T pane h select-pane -L \; switch-client -T pane
bind-key -T pane j select-pane -D \; switch-client -T pane
bind-key -T pane k select-pane -U \; switch-client -T pane
bind-key -T pane l select-pane -R \; switch-client -T pane
bind-key -T pane Left select-pane -L \; switch-client -T pane
bind-key -T pane Down select-pane -D \; switch-client -T pane
bind-key -T pane Up select-pane -U \; switch-client -T pane
bind-key -T pane Right select-pane -R \; switch-client -T pane
bind-key -T pane n split-window -v -c "#{pane_current_path}" \; switch-client -T root
bind-key -T pane s split-window -v -c "#{pane_current_path}" \; switch-client -T root
bind-key -T pane v split-window -h -c "#{pane_current_path}" \; switch-client -T root
bind-key -T pane f resize-pane -Z \; switch-client -T root
bind-key -T pane p last-pane \; switch-client -T pane
bind-key -T pane x kill-pane \; switch-client -T root
bind-key -T pane c command-prompt -I "#{pane_title}" "select-pane -T '%%'" \; switch-client -T root

# Tab mode
bind-key -T tab Escape switch-client -T root
bind-key -T tab C-t switch-client -T root
bind-key -T tab h previous-window \; switch-client -T tab
bind-key -T tab j next-window \; switch-client -T tab
bind-key -T tab k previous-window \; switch-client -T tab
bind-key -T tab l next-window \; switch-client -T tab
bind-key -T tab Left previous-window \; switch-client -T tab
bind-key -T tab Down next-window \; switch-client -T tab
bind-key -T tab Up previous-window \; switch-client -T tab
bind-key -T tab Right next-window \; switch-client -T tab
bind-key -T tab 1 select-window -t :=1 \; switch-client -T root
bind-key -T tab 2 select-window -t :=2 \; switch-client -T root
bind-key -T tab 3 select-window -t :=3 \; switch-client -T root
bind-key -T tab 4 select-window -t :=4 \; switch-client -T root
bind-key -T tab 5 select-window -t :=5 \; switch-client -T root
bind-key -T tab 6 select-window -t :=6 \; switch-client -T root
bind-key -T tab 7 select-window -t :=7 \; switch-client -T root
bind-key -T tab 8 select-window -t :=8 \; switch-client -T root
bind-key -T tab 9 select-window -t :=9 \; switch-client -T root
bind-key -T tab a new-window -c "#{pane_current_path}" \; switch-client -T root
bind-key -T tab c command-prompt -I "#{window_name}" "rename-window '%%'" \; switch-client -T root
bind-key -T tab q kill-window \; switch-client -T root
bind-key -T tab x kill-window \; switch-client -T root
bind-key -T tab s setw synchronize-panes \; switch-client -T root
bind-key -T tab [ swap-window -t -1 \; switch-client -T root
bind-key -T tab ] swap-window -t +1 \; switch-client -T root
bind-key -T tab Tab last-window \; switch-client -T tab

# Resize mode
bind-key -T resize Escape switch-client -T root
bind-key -T resize C-n switch-client -T root
bind-key -T resize h resize-pane -L 5 \; switch-client -T resize
bind-key -T resize j resize-pane -D 3 \; switch-client -T resize
bind-key -T resize k resize-pane -U 3 \; switch-client -T resize
bind-key -T resize l resize-pane -R 5 \; switch-client -T resize
bind-key -T resize Left resize-pane -L 5 \; switch-client -T resize
bind-key -T resize Down resize-pane -D 3 \; switch-client -T resize
bind-key -T resize Up resize-pane -U 3 \; switch-client -T resize
bind-key -T resize Right resize-pane -R 5 \; switch-client -T resize
bind-key -T resize H resize-pane -R 5 \; switch-client -T resize
bind-key -T resize J resize-pane -U 3 \; switch-client -T resize
bind-key -T resize K resize-pane -D 3 \; switch-client -T resize
bind-key -T resize L resize-pane -L 5 \; switch-client -T resize
bind-key -T resize - resize-pane -Z \; switch-client -T root
bind-key -T resize = resize-pane -Z \; switch-client -T root
bind-key -T resize + resize-pane -Z \; switch-client -T root

# Move mode
bind-key -T move Escape switch-client -T root
bind-key -T move C-h switch-client -T root
bind-key -T move h swap-pane -s ! -t "{left-of}" \; switch-client -T move
bind-key -T move j swap-pane -s ! -t "{down-of}" \; switch-client -T move
bind-key -T move k swap-pane -s ! -t "{up-of}" \; switch-client -T move
bind-key -T move l swap-pane -s ! -t "{right-of}" \; switch-client -T move
bind-key -T move Left swap-pane -s ! -t "{left-of}" \; switch-client -T move
bind-key -T move Down swap-pane -s ! -t "{down-of}" \; switch-client -T move
bind-key -T move Up swap-pane -s ! -t "{up-of}" \; switch-client -T move
bind-key -T move Right swap-pane -s ! -t "{right-of}" \; switch-client -T move
bind-key -T move n swap-pane -D \; switch-client -T move
bind-key -T move p swap-pane -U \; switch-client -T move
bind-key -T move Tab rotate-window \; switch-client -T move

# tmux-native compatibility mode, similar to the Zellij tmux table.
bind-key -T tmux Escape switch-client -T root
bind-key -T tmux C-b send-keys C-b \; switch-client -T root
bind-key -T tmux '"' split-window -v -c "#{pane_current_path}" \; switch-client -T root
bind-key -T tmux % split-window -h -c "#{pane_current_path}" \; switch-client -T root
bind-key -T tmux , command-prompt -I "#{window_name}" "rename-window '%%'" \; switch-client -T root
bind-key -T tmux [ copy-mode \; switch-client -T root
bind-key -T tmux c new-window -c "#{pane_current_path}" \; switch-client -T root
bind-key -T tmux d detach-client \; switch-client -T root
bind-key -T tmux h select-pane -L \; switch-client -T root
bind-key -T tmux j select-pane -D \; switch-client -T root
bind-key -T tmux k select-pane -U \; switch-client -T root
bind-key -T tmux l select-pane -R \; switch-client -T root
bind-key -T tmux n next-window \; switch-client -T root
bind-key -T tmux o select-pane -t :.+
bind-key -T tmux p previous-window \; switch-client -T root
bind-key -T tmux space next-layout \; switch-client -T root
bind-key -T tmux x kill-pane \; switch-client -T root

# Copy mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
